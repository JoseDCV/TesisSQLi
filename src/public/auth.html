<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Login/Registro - Ciberseguridad</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->  
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->  
        <link href="https://fonts.googleapis.com/css?family=Roboto|Inter|Orbitron" rel="stylesheet" />
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                background-image: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop');
                background-size: cover;
                color: #ffffff;
                font-family: 'Roboto', sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                position: relative;
            }
            .overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 1;
            }
            .card {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 15px;
                backdrop-filter: blur(10px);
                padding: 20px;
                box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
                width: 400px;
                text-align: center;
                position: relative;
                border: 1px solid rgba(0, 255, 0, 0.3);
                z-index: 2;
            }
            h2 {
                font-family: 'Orbitron', sans-serif;
                margin-bottom: 20px;
            }
            .tab {
                display: inline-block;
                width: 50%;
                padding: 10px 0;
                cursor: pointer;
                border: 1px solid transparent;
                border-radius: 5px;
                margin: 0;
                transition: background 0.3s, color 0.3s;
            }
            .tab.active {
                background: rgba(0, 255, 0, 0.5);
                color: #ffffff;
            }
            input {
                background: rgba(255, 255, 255, 0.2);
                border: none;
                border-radius: 5px;
                padding: 10px;
                margin: 10px 0;
                width: 100%;
                color: #ffffff;
                transition: border 0.3s, box-shadow 0.3s;
            }
            input:focus {
                outline: none;
                box-shadow: 0 0 5px #00ff00;
            }
            button {
                background: linear-gradient(90deg, #00ff00, #00ccff);
                border: none;
                border-radius: 5px;
                padding: 10px;
                color: #ffffff;
                cursor: pointer;
                transition: box-shadow 0.3s;
            }
            button:hover {
                box-shadow: 0 0 10px #00ff00;
            }
            .back-btn {
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid #00ff00;
                color: #ffffff;
                padding: 10px 15px;
                border-radius: 5px;
                text-decoration: none;
                font-family: 'Roboto', sans-serif;
                font-size: 14px;
                cursor: pointer;
                transition: background 0.3s, color 0.3s;
                z-index: 3;
            }
            .back-btn:hover {
                background: #00ff00;
                color: #000000;
            }
        </style>
    </head>
    <body id="page-top">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>
        <div class="overlay"></div>
        <div class="card">
            <h2>SYSTEM ACCESS</h2>
            <div class="tabs">
                <div class="tab active" onclick="showForm('login')">Iniciar Sesión</div>
                <div class="tab" onclick="showForm('register')">Registro</div>
            </div>
            <form id="login" class="form">
                <input type="text" placeholder="Usuario" required />
                <input type="password" placeholder="Contraseña" required />
                <button type="submit">Entrar</button>
            </form>
            <form id="register" class="form" style="display:none;">
                <input type="text" placeholder="Usuario" required />
                <input type="email" placeholder="Correo" required />
                <input type="password" placeholder="Contraseña" required />
                <button type="submit">Registrarse</button>
            </form>
        </div>
        <script>
            function showForm(form) {
                document.querySelectorAll('.form').forEach(f => f.style.display = 'none');
                document.getElementById(form).style.display = 'block';
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelector(`.tab[onclick="showForm('${form}')"]`).classList.add('active');
            }
        </script>
    </body>
</html>
