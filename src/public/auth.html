<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Login/Registro - Ciberseguridad</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->  
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->  
        <link href="https://fonts.googleapis.com/css?family=Roboto|Inter|Orbitron" rel="stylesheet" />
        <style>
            body {
                background-color: #0a0a0a;
                color: #ffffff;
                font-family: 'Roboto', sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 15px;
                backdrop-filter: blur(10px);
                padding: 20px;
                box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
                width: 300px;
                text-align: center;
            }
            .tab {
                display: inline-block;
                padding: 10px 20px;
                cursor: pointer;
                border: 1px solid transparent;
                border-radius: 5px;
                margin: 0 5px;
                transition: background 0.3s;
            }
            .tab.active {
                background: rgba(255, 255, 255, 0.2);
                border-color: #00ff00;
            }
            input {
                background: rgba(255, 255, 255, 0.2);
                border: none;
                border-radius: 5px;
                padding: 10px;
                margin: 10px 0;
                width: 100%;
                color: #ffffff;
                transition: border 0.3s, box-shadow 0.3s;
            }
            input:focus {
                outline: none;
                box-shadow: 0 0 5px #00ff00;
            }
            button {
                background: linear-gradient(90deg, #00ff00, #00ccff);
                border: none;
                border-radius: 5px;
                padding: 10px;
                color: #ffffff;
                cursor: pointer;
                transition: box-shadow 0.3s;
            }
            button:hover {
                box-shadow: 0 0 10px #00ff00;
            }
        </style>
    </head>
    <body id="page-top">
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="showForm('login')">Iniciar Sesión</div>
                <div class="tab" onclick="showForm('register')">Registro</div>
            </div>
            <form id="login" class="form">
                <input type="text" placeholder="Usuario" required />
                <input type="password" placeholder="Contraseña" required />
                <button type="submit">Entrar</button>
            </form>
            <form id="register" class="form" style="display:none;">
                <input type="text" placeholder="Usuario" required />
                <input type="email" placeholder="Correo" required />
                <input type="password" placeholder="Contraseña" required />
                <button type="submit">Registrarse</button>
            </form>
        </div>
        <script>
            function showForm(form) {
                document.querySelectorAll('.form').forEach(f => f.style.display = 'none');
                document.getElementById(form).style.display = 'block';
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelector(`.tab[onclick="showForm('${form}')"]`).classList.add('active');
            }
        </script>
    </body>
</html>
